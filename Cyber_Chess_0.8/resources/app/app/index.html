<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cyber Chess</title>
<style>
  @font-face {
    font-family: "Upheaval";
    src: url("media/fonts/upheavtt.ttf") format("truetype");
    font-weight: 400 900;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "AlphaProta";
    src: url("media/fonts/AlphaProta-Regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --font-header: "Upheaval", "Orbitron", "Arial Black", monospace;
    --font-type: "Upheaval", "Orbitron", "Arial Black", monospace;
    --font-story: "Upheaval", "Arial Black", monospace;
    --font-arcade: var(--font-header);
    --font-label: var(--font-type);
    --font-digital: "DSEG7", var(--font-type);
    --neon-cyan: #33f6ff;
    --neon-blue: #0077ff;
    --neon-violet: #b000ff;
  }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0a12; font-family: var(--font-type); }
  #root { width: 100vw; height: 100vh; }
  #root canvas { display: block; width: 100% !important; height: 100% !important; }
  .board2d-shell {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    gap: 12px;
    padding: clamp(12px, 3vw, 28px);
    background:
      repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.34) 0 2px, rgba(0, 255, 204, 0.05) 2px 4px),
      radial-gradient(circle at center, rgba(0, 255, 204, 0.12), rgba(2, 5, 12, 0.96) 64%);
    color: #ddfff7;
  }
  .board2d-status {
    align-self: end;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: min(92vmin, 720px);
    min-height: 34px;
    color: #bffef8;
    text-shadow: 0 0 10px rgba(0, 255, 204, 0.7);
    font: 900 clamp(10px, 1.8vmin, 14px) var(--font-label);
    letter-spacing: 0;
  }
  .board2d-status strong {
    color: #39ff14;
  }
  .board2d-grid {
    align-self: start;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    width: min(92vmin, 720px);
    aspect-ratio: 1;
    border: 3px ridge #00ffcc;
    box-shadow: 0 0 0 3px #000, 0 0 34px rgba(0, 255, 204, 0.42);
    background: #02050c;
  }
  .board2d-square {
    position: relative;
    display: grid;
    place-items: center;
    width: 100%;
    aspect-ratio: 1;
    padding: 0;
    border: 1px solid rgba(0, 0, 0, 0.55);
    color: #f6fffe;
    background: #07131c;
    cursor: pointer;
    font: 900 clamp(22px, 7vmin, 58px) Georgia, "Times New Roman", serif;
    letter-spacing: 0;
    text-shadow: 0 2px 0 #000, 0 0 12px rgba(0, 255, 204, 0.55);
  }
  .board2d-square span {
    transform: translateY(-0.04em);
  }
  .board2d-light {
    background: linear-gradient(135deg, #1fd7c5, #1686be);
  }
  .board2d-dark {
    background: linear-gradient(135deg, #141827, #4c1494);
  }
  .board2d-square.is-selected {
    outline: 3px solid #39ff14;
    outline-offset: -5px;
  }
  .board2d-square.is-legal::after {
    content: "";
    position: absolute;
    inset: 34%;
    border-radius: 50%;
    background: rgba(57, 255, 20, 0.56);
    box-shadow: 0 0 14px rgba(57, 255, 20, 0.9);
    pointer-events: none;
  }
  .board2d-square.is-flashing {
    box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.92), 0 0 18px rgba(255, 255, 255, 0.45);
  }
  button,
  input,
  select,
  textarea,
  canvas,
  [role="button"] {
    -webkit-app-region: no-drag;
  }
  #loading {
    position: fixed; inset: 0; display: grid; place-items: center; pointer-events: none;
    color: #8fa6b8; font: 12px var(--font-type); letter-spacing: 1px;
  }
  body[data-chess-mounted] #loading { display: none; }
  .cyber-menu {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 18px;
    pointer-events: auto;
    background:
      repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.24) 0 2px, rgba(0, 255, 204, 0.04) 2px 4px),
      radial-gradient(circle at center, rgba(255, 0, 190, 0.14), rgba(0, 0, 0, 0.52) 62%);
    color: #ddfff7;
    font-family: var(--font-type);
  }
  .cyber-panel {
    box-sizing: border-box;
    width: min(94vw, 860px);
    max-height: calc(100vh - 36px);
    overflow: hidden;
    padding: 12px;
    border: 3px ridge #00ffcc;
    background: #050914;
    box-shadow: 0 0 0 3px #000, 0 0 38px rgba(0, 255, 204, 0.36);
  }
  .cyber-menu.tower-menu {
    place-items: stretch;
    padding: 0;
    background: #02050c;
  }
  .cyber-menu.story-menu,
  .cyber-menu.profile-menu,
  .cyber-menu.side-menu,
  .cyber-menu.video-menu {
    place-items: stretch;
    padding: 0;
    background: #02050c;
  }
  .cyber-panel.tower-panel {
    width: 100vw;
    height: 100vh;
    max-height: none;
    padding: 0;
    border: 0;
    background: #02050c;
    box-shadow: none;
  }
  .cyber-panel.story-panel,
  .cyber-panel.profile-panel-shell,
  .cyber-panel.side-panel,
  .cyber-panel.video-panel {
    width: 100vw;
    height: 100vh;
    max-height: none;
    padding: 0;
    border: 0;
    background: #02050c;
    box-shadow: none;
  }
  .cyber-panel * {
    box-sizing: border-box;
  }
  .electron-close {
    position: fixed;
    z-index: 10000;
    top: 10px;
    right: 12px;
    display: grid;
    place-items: center;
    width: 28px;
    height: 28px;
    padding: 0;
    color: #39ff14;
    background: rgba(0, 0, 0, 0.36);
    border: 1px solid rgba(57, 255, 20, 0.54);
    font: 900 18px/1 var(--font-header);
    letter-spacing: 0;
    text-shadow: 0 0 7px rgba(57, 255, 20, 0.95), 0 2px 0 #000;
    box-shadow: 0 0 9px rgba(57, 255, 20, 0.28);
    cursor: pointer;
  }
  .electron-close:hover,
  .electron-close:focus-visible {
    color: #b9ffad;
    border-color: #39ff14;
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.48);
    outline: none;
  }
  .electron-drag-tag {
    position: fixed;
    z-index: 10000;
    top: 0;
    left: 0;
    width: 74px;
    height: 74px;
    -webkit-app-region: drag;
    cursor: grab;
    pointer-events: auto;
  }
  .electron-drag-tag:active {
    cursor: grabbing;
  }
  .electron-drag-tag::before {
    content: "";
    position: absolute;
    inset: 10px auto auto 10px;
    width: 50px;
    height: 50px;
    clip-path: polygon(0 0, 100% 0, 0 100%);
    background:
      linear-gradient(135deg, rgba(57, 255, 20, 0.16), rgba(57, 255, 20, 0.04) 48%, transparent 50%),
      repeating-linear-gradient(135deg, rgba(57, 255, 20, 0.48) 0 1px, transparent 1px 9px);
    border-top: 1px solid rgba(57, 255, 20, 0.54);
    border-left: 1px solid rgba(57, 255, 20, 0.54);
    box-shadow:
      inset 0 0 11px rgba(57, 255, 20, 0.18),
      0 0 9px rgba(57, 255, 20, 0.28);
    opacity: 0.9;
  }
  .electron-drag-tag::after {
    content: "";
    position: absolute;
    top: 10px;
    left: 10px;
    width: 22px;
    height: 22px;
    border-top: 2px solid #39ff14;
    border-left: 2px solid #39ff14;
    filter: drop-shadow(0 0 7px rgba(57, 255, 20, 0.95));
    opacity: 0.92;
  }
  .electron-corner-minimize {
    position: absolute;
    z-index: 1;
    top: 10px;
    left: 10px;
    width: 50px;
    height: 50px;
    padding: 0;
    border: 0;
    background: transparent;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }
  .electron-corner-minimize:focus-visible {
    outline: 2px solid #39ff14;
    outline-offset: -7px;
  }
  .cyber-hero {
    position: relative;
    display: grid;
    width: 100%;
    aspect-ratio: 1672 / 941;
    min-height: 280px;
    max-height: min(62vh, 470px);
    margin: 0 0 10px;
    overflow: hidden;
    background: #02040a;
  }
  .cyber-hero::after {
    content: none;
    position: absolute;
    inset: 0;
    background: none;
    pointer-events: none;
  }
  .cyber-hero-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    transform: scale(1.08);
  }
  .hero-color-overlay {
    position: absolute;
    z-index: 2;
    left: 0;
    right: 0;
    bottom: 0;
    display: grid;
    justify-items: center;
    padding: 54px 14px 14px;
    background: transparent;
    pointer-events: none;
  }
  .intro-copy {
    display: grid;
    gap: 8px;
    margin: 0 auto 10px;
    max-width: 780px;
    color: #c9fff5;
    font-size: 13px;
    line-height: 1.35;
  }
  .intro-copy p {
    margin: 0;
  }
  .intro-video-shell {
    --intro-poster-view-height: 100vh;
    position: relative;
    display: grid;
    place-items: center;
    width: 100%;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    color: #00ffcc;
    background: #02050c;
    border: 0;
    font: 900 13px var(--font-label);
    letter-spacing: 2px;
  }
  .intro-video-shell::after {
    content: none;
    position: absolute;
    z-index: 1;
    left: 0;
    right: 0;
    bottom: 0;
    height: 8%;
    background:
      linear-gradient(90deg, rgba(0, 255, 204, 0.12) 1px, transparent 1px),
      linear-gradient(0deg, rgba(0, 255, 204, 0.12) 1px, transparent 1px),
      #080b14;
    background-size: 20px 20px;
    border-top: 1px solid rgba(0, 255, 204, 0.42);
    pointer-events: none;
  }
  .intro-video-shell video,
  .intro-video-shell .intro-poster {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    transform: scale(1.08);
    opacity: 0;
    filter: none;
  }
  .intro-video-shell .intro-poster {
    width: 100%;
    height: auto;
    object-fit: initial;
    object-position: initial;
    transform: translateY(calc(var(--intro-poster-view-height) - 100%));
  }
  .menu-step-video.pan-started .intro-poster {
    animation: full-width-pan-up 10s ease-in-out forwards;
  }
  .intro-video-shell.ready video {
    opacity: 1;
  }
  .intro-video-shell.ready .intro-poster {
    opacity: 1;
  }
  .intro-video-shell.ready span {
    display: none;
  }
  @keyframes full-width-pan-up {
    0% {
      transform: translateY(calc(var(--intro-poster-view-height) - 100%));
    }
    100% {
      transform: translateY(-5vh);
    }
  }
  .color-picker {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 150px));
    justify-content: center;
    gap: 8px;
    margin: 0;
    pointer-events: auto;
  }
  .color-picker button {
    min-height: 36px;
    color: #dff;
    background: #101018;
    border: 3px outset #8f8f8f;
    font: 900 13px var(--font-type);
    cursor: pointer;
  }
  .color-picker button.selected {
    color: #001410;
    background: #7dffcc;
    border-style: inset;
  }
  .hud-label,
  .story-copy span,
  .matchup-line,
  .enemy-load-copy span,
  .fighter-label span,
  .versus-core span,
  .result-kicker,
  .result-enemy-card span,
  .next-opponent-panel span,
  .settings-kicker,
  .settings-group > strong,
  .settings-volume span {
    font-family: var(--font-label);
    letter-spacing: 0.08em;
    color: var(--neon-cyan);
    text-shadow:
      0 0 4px var(--neon-cyan),
      0 0 10px var(--neon-blue);
  }
  .cyber-timer {
    font-family: var(--font-digital);
    font-size: clamp(42px, 7vw, 96px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0.04em;
    background:
      linear-gradient(180deg, #eaffff 0%, #6ff7ff 35%, #0ab8ff 65%, #004eff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow:
      0 0 4px #7dfcff,
      0 0 8px #19e6ff,
      0 0 16px #008cff,
      0 0 28px #b000ff;
    filter:
      drop-shadow(0 0 4px #1ffcff)
      drop-shadow(0 0 12px #0077ff)
      drop-shadow(0 0 20px #b000ff);
  }
  .timer-frame {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 150px;
    padding: 14px 18px 10px;
    background:
      linear-gradient(180deg, #111827 0%, #050812 100%);
    border: 3px solid #22e6ff;
    box-shadow:
      inset 0 0 12px #004dff,
      0 0 8px #22e6ff,
      0 0 20px #b000ff;
    clip-path: polygon(
      10% 0%, 90% 0%,
      100% 18%, 100% 82%,
      90% 100%, 10% 100%,
      0% 82%, 0% 18%
    );
  }
  .matchup-line {
    margin: 0 0 8px;
    color: #fff200;
    font-size: 12px;
    font-weight: 900;
    text-align: center;
  }
  .opponent-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }
  .opponent-card {
    min-width: 0;
    padding: 7px;
    color: #dff;
    text-align: left;
    background: #101018;
    border: 3px outset #8f8f8f;
    cursor: pointer;
    font: inherit;
  }
  .opponent-card.selected {
    color: #001410;
    background: #7dffcc;
    border-style: inset;
  }
  .opponent-card img {
    display: block;
    width: 100%;
    height: clamp(112px, 23vh, 156px);
    object-fit: contain;
    object-position: center center;
    background: #05070e;
    margin-bottom: 7px;
    border: 2px solid #000;
    image-rendering: auto;
  }
  .opponent-name,
  .opponent-difficulty,
  .opponent-tagline {
    display: block;
  }
  .opponent-name {
    color: inherit;
    font-size: 18px;
    font-weight: 900;
  }
  .opponent-difficulty {
    margin: 2px 0 5px;
    color: #ff5cff;
    font-size: 11px;
    font-weight: 900;
  }
  .opponent-card.selected .opponent-difficulty {
    color: #7a004a;
  }
  .opponent-tagline {
    min-height: 34px;
    font-size: 12px;
    line-height: 1.2;
  }
  .opponent-bio {
    display: block;
    min-height: 54px;
    margin-top: 7px;
    font-size: 11px;
    line-height: 1.24;
  }
  .cyber-start {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: grid;
    place-items: end center;
    width: 100vw;
    height: 100vh;
    padding: 0 0 clamp(8px, 1.6vh, 18px);
    color: #fff200;
    background: transparent;
    border: 0;
    font: 900 clamp(24px, 4vw, 54px) var(--font-label);
    letter-spacing: 0;
    text-shadow: 0 4px 0 #000, 0 0 18px rgba(255, 242, 0, 0.72), 0 0 34px rgba(255, 0, 190, 0.54);
    cursor: pointer;
    opacity: 1;
  }
  .menu-step-video.pan-started .cyber-start {
    opacity: 0;
    animation: play-button-glitch-in 920ms steps(1, end) 10s both;
  }
  @keyframes play-button-glitch-in {
    0% {
      opacity: 0;
      transform: translate3d(-12px, 3px, 0) skewX(-8deg);
      filter: saturate(1.8) hue-rotate(42deg);
    }
    10% {
      opacity: 1;
      transform: translate3d(14px, -2px, 0) skewX(7deg);
      filter: saturate(2.2) hue-rotate(-34deg);
    }
    18% {
      opacity: 0.62;
      transform: translate3d(-7px, 2px, 0) skewX(-4deg);
      filter: saturate(1.9) contrast(1.35);
    }
    30% {
      opacity: 1;
      transform: translate3d(9px, 0, 0) skewX(5deg);
      filter: saturate(2.1) hue-rotate(22deg);
    }
    46% {
      opacity: 0.76;
      transform: translate3d(-3px, -2px, 0) skewX(-2deg);
      filter: saturate(1.55) contrast(1.25);
    }
    64% {
      opacity: 1;
      transform: translate3d(4px, 1px, 0) skewX(2deg);
      filter: saturate(1.4);
    }
    100% {
      opacity: 1;
      transform: translate3d(0, 0, 0) skewX(0deg);
      filter: none;
    }
  }
  .menu-step {
    min-height: min(620px, calc(100vh - 66px));
    display: grid;
    align-content: center;
  }
  .tower-step {
    position: relative;
    min-height: min(620px, calc(100vh - 66px));
    overflow: hidden;
    align-content: stretch;
    background: #02050c;
    border: 1px solid rgba(0, 255, 204, 0.34);
  }
  .tower-panel .tower-step {
    width: 100vw;
    min-height: 100vh;
    border: 0;
  }
  .tower-bg,
  .tower-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .tower-bg {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
  }
  .tower-overlay {
    background: none;
  }
  .tower-actions {
    position: absolute;
    z-index: 3;
    left: clamp(12px, 2.4vw, 34px);
    right: clamp(12px, 2.4vw, 34px);
    bottom: clamp(14px, 2.4vh, 30px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .tower-actions button {
    min-width: 138px;
    min-height: 40px;
    color: #000;
    background: #c0c0c0;
    border: 4px outset #fff;
    font: 900 13px var(--font-type);
    cursor: pointer;
  }
  .tower-actions button.selected {
    background: #fff200;
    border-color: #ffe65c;
  }
  .menu-step-video {
    position: relative;
    justify-items: center;
    padding: 0;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 42%, rgba(0, 255, 204, 0.13), transparent 50%),
      linear-gradient(90deg, rgba(0, 255, 204, 0.11) 1px, transparent 1px),
      linear-gradient(0deg, rgba(0, 255, 204, 0.11) 1px, transparent 1px),
      #040811;
    background-size: auto, 24px 24px, 24px 24px, auto;
    border: 0;
  }
  .story-step {
    position: relative;
    width: 100vw;
    height: 100vh;
    min-height: 0;
    overflow: hidden;
    display: block;
    padding: 0;
    background: #02050c;
    border: 0;
  }
  .story-image-frame {
    position: relative;
    display: block;
    width: 100%;
    height: 100%;
    min-height: 0;
    overflow: hidden;
    background: #03050b;
    border: 0;
    box-shadow: none;
  }
  .story-art,
  .story-scanline {
    position: absolute;
    inset: 0;
  }
  .story-art {
    z-index: 0;
    width: 100%;
    height: 100%;
    min-height: 0;
    object-fit: cover;
    object-position: center center;
    image-rendering: auto;
    border: 0;
    background: transparent;
    transform: none;
  }
  .story-art-too-deep {
    transform: scale(1.34);
    transform-origin: 50% 50%;
    animation: story-too-deep-zoom-out var(--story-image-duration, 5.2s) ease-out forwards;
  }
  .story-scanline {
    z-index: 2;
    width: 100%;
    height: 100%;
    pointer-events: none;
    background: none;
  }
  .story-copy {
    position: absolute;
    z-index: 4;
    left: clamp(14px, 4vw, 58px);
    bottom: clamp(104px, 15vh, 146px);
    display: grid;
    gap: clamp(6px, 1.1vh, 10px);
    width: min(760px, calc(100vw - clamp(28px, 8vw, 116px)));
    margin: 0;
    max-height: calc(100vh - clamp(166px, 24vh, 216px));
    padding: clamp(13px, 2vw, 22px);
    overflow: hidden;
    color: #dffcff;
    background: transparent;
    border: 0;
    box-shadow: none;
    font-family: var(--font-story);
    text-shadow:
      0 4px 0 #000,
      2px 2px 0 #000,
      -2px 2px 0 #000,
      0 0 8px rgba(0, 255, 204, 0.78),
      0 0 18px rgba(0, 0, 0, 0.98),
      0 0 28px rgba(0, 0, 0, 0.9);
  }
  .story-copy::before {
    content: ">";
    position: absolute;
    left: 8px;
    top: 7px;
    color: #fff200;
    font: 400 14px var(--font-story);
    text-shadow: 0 0 8px #fff200;
  }
  .story-copy::after {
    content: none;
  }
  .story-copy .story-kicker {
    min-width: 0;
    padding-left: 12px;
    color: #7dffcc;
    font-family: var(--font-story);
    font-size: clamp(13px, 1.25vw, 18px);
    font-weight: 400;
    letter-spacing: 0.04em;
    overflow-wrap: anywhere;
  }
  .story-copy .story-title {
    min-width: 0;
    margin: 0;
    color: #fff200;
    font-family: var(--font-story);
    font-size: clamp(30px, 4.6vw, 62px);
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0;
